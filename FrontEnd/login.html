<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Work+Sans&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Page de connexion au site Sophie Bluel : architecte d''intérieur."
    />
    <link rel="stylesheet" href="./assets/style.css" />
    <script src="connection.js" defer></script>
  </head>
  <body>
    <header>
      <h1>
        <a href="index.html"
          >Sophie Bluel <span>Architecte d'intérieur</span></a
        >
      </h1>
      <nav>
        <ul>
          <li><a href="index.html#portfolio"> projets </a></li>
          <li><a href="index.html#contact"> contact </a></li>
          <li><a href="login.html"> login </a></li>
          <li>
            <a href="https://www.instagram.com/">
              <img
                class="imglogo"
                src="./assets/icons/instagram.png"
                alt="Instagram"
              />
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="connexion">
        <h2>Log in</h2>
        <form id="loginForm">
          <label for="email">E-mail</label>
          <input type="email" name="email" id="email" />
          <label for="password">Mot de passe</label>
          <input type="password" name="password" id="password" />
          <input type="button" value="Se connecter" id="login-btn" />
          <a href="#">Mot de passe oublié</a>
        </form>
      </section>
    </main>
    <footer>
      <nav>
        <ul>
          <li><a href="#">Mentions Légales</a></li>
        </ul>
      </nav>
    </footer>
  </body>
</html>
